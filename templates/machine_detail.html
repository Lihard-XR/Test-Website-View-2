<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>설비 대시보드</title>

  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="/static/machine_detail.css" />

  <script>
    window.MACHINE_IP = {{ ip | tojson }};
  </script>
</head>

<body>
  <div class="app">
    <header class="navbar detail-navbar">
      <div class="detail-nav-left">
        <div class="detail-title-group">
          <div class="title" id="machineTitle">설비 상세</div>
          <!-- <div class="detail-subtitle">
            IP <span id="machineIpText"></span>
          </div> -->
        </div>
      </div>

      <div class="top-menu detail-nav-right">
        <button
          class="top-btn"
          type="button"
          onclick="location.href='/dashboard'"
          aria-label="메인 대시보드로 이동"
        >
          대시보드
        </button>
      </div>
    </header>

    <main class="main">
      <section class="left">
        <div class="panel panel-3d">
          <div
            class="circle"
            id="machineStatusBadge"
            role="status"
            aria-live="polite"
            aria-label="설비 상태"
          >
            -
          </div>

          <div id="threeCanvas" class="three-canvas" aria-label="설비 3D 화면"></div>
          <div class="three-placeholder" id="threePlaceholder" aria-hidden="true">3D</div>
        </div>
      </section>

      <aside class="right">
        <div class="panel panel-right">
          <div class="tool-row">
            <button
              class="tool-open"
              id="toolOpenBtn"
              type="button"
              aria-label="툴 리스트 열기"
              aria-expanded="false"
              aria-controls="toolDrawer"
            >
              <span class="chev" aria-hidden="true">›</span>
            </button>

            <div class="tool-value" id="toolValue" aria-live="polite">-</div>

            <div
              class="tool-drawer"
              id="toolDrawer"
              aria-hidden="true"
              aria-label="툴 리스트"
            >
              <div class="drawer-head">
                <div class="drawer-title">툴 리스트</div>
                <button
                  class="drawer-close"
                  id="toolCloseBtn"
                  type="button"
                  aria-label="툴 리스트 닫기"
                >
                  ×
                </button>
              </div>
              <div class="drawer-body" id="toolList"></div>
            </div>

            <div class="backdrop" id="backdrop" aria-hidden="true"></div>
          </div>

          <div class="box box-large">
            <div class="box-title">권고 교체 구간</div>
            <div class="date-range" id="dateRange">-</div>
            <div class="subtext" id="remainText">-</div>
          </div>

          <div class="grid-2">
            <div class="box box-mid">
              <div class="kv">
                <div class="k">부하율</div>
                <div class="v">
                  <span id="loadValue">-</span><span class="unit">%</span>
                </div>
              </div>

              <div class="divider"></div>

              <div class="kv">
                <div class="k">RPM</div>
                <div class="v">
                  <span id="rpmValue">-</span><span class="unit">s</span>
                </div>
              </div>
            </div>

            <div class="box box-mid box-quad">
              <div class="quad">
                <div class="cell">
                  <div class="k">생산시간</div>
                  <div class="v"><span id="prodTime">-</span><span class="unit">분</span></div>
                </div>

                <div class="cell">
                  <div class="k">프로그램</div>
                  <div class="v" id="programNo">-</div>
                </div>

                <div class="cell">
                  <div class="k">알람코드</div>
                  <div class="v" id="alarmCode">-</div>
                </div>

                <div class="cell">
                  <div class="k">툴번호</div>
                  <div class="v" id="toolNo">-</div>
                </div>
              </div>
            </div>
          </div>

          <div class="box box-chart">
            <div class="legend" aria-label="그래프 범례">
              <span class="lg">
                <span class="swatch swatch-a" aria-hidden="true"></span>부하율
              </span>
              <span class="lg">
                <span class="swatch swatch-b" aria-hidden="true"></span>RPM
              </span>
            </div>

            <canvas
              id="chart"
              tabindex="0"
              aria-label="부하율 및 RPM 추이 그래프"
            ></canvas>
          </div>
        </div>
      </aside>
    </main>
  </div>

  <div class="chart-modal-backdrop" id="chartModalBackdrop" aria-hidden="true">
    <div
      class="chart-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="chartModalTitle"
      aria-describedby="chartModalDesc"
    >
      <div class="chart-modal-head">
        <div class="chart-modal-title" id="chartModalTitle">그래프 확대 보기</div>
        <button
          type="button"
          class="chart-modal-close"
          id="chartModalCloseBtn"
          aria-label="확대 그래프 닫기"
        >
          ×
        </button>
      </div>

      <p id="chartModalDesc" class="sr-only">
        부하율과 RPM 그래프를 확대하여 확인하는 창입니다.
      </p>

      <div class="chart-modal-meta" id="chartModalMeta">-</div>

      <div class="chart-modal-legend" aria-label="확대 그래프 범례">
        <span class="lg">
          <span class="swatch swatch-a" aria-hidden="true"></span>부하율
        </span>
        <span class="lg">
          <span class="swatch swatch-b" aria-hidden="true"></span>RPM
        </span>
      </div>

      <div class="chart-modal-body">
        <canvas
          id="chartModalCanvas"
          aria-label="확대된 부하율 및 RPM 추이 그래프"
        ></canvas>
      </div>
    </div>
  </div>

  <script type="module" src="/static/machine_detail.js"></script>
</body>
</html>
